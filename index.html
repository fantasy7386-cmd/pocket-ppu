<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a5276">
<title>Pocket PPu</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root {
  --bg: #f5f7fa;
  --bg-card: #ffffff;
  --bg-header: #1a5276;
  --bg-search: #ffffff;
  --text: #2c3e50;
  --text-secondary: #7f8c8d;
  --text-inverse: #ffffff;
  --accent: #2980b9;
  --accent-light: #ebf5fb;
  --border: #e0e4e8;
  --highlight: #fff3cd;
  --shadow: rgba(0,0,0,0.08);
  --cat-gradient: linear-gradient(135deg, #2980b9, #1a5276);
  --radius: 12px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
[data-theme="dark"] {
  --bg: #1a1a2e;
  --bg-card: #16213e;
  --bg-header: #0f3460;
  --bg-search: #16213e;
  --text: #e0e0e0;
  --text-secondary: #95a5a6;
  --text-inverse: #ffffff;
  --accent: #3498db;
  --accent-light: #1a2d4a;
  --border: #2c3e50;
  --highlight: #4a3f00;
  --shadow: rgba(0,0,0,0.3);
  --cat-gradient: linear-gradient(135deg, #0f3460, #1a1a2e);
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Header */
.header {
  background: var(--bg-header);
  color: var(--text-inverse);
  padding: calc(var(--safe-top) + 12px) 16px 12px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 8px var(--shadow);
}
.header-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.header-title {
  font-size: 20px; font-weight: 700; letter-spacing: 0.5px;
}
.header-subtitle {
  font-size: 10px; opacity: 0.7; font-weight: 400; display: block;
}
.header-actions { display: flex; gap: 8px; }
.header-btn {
  background: rgba(255,255,255,0.15); border: none; color: var(--text-inverse);
  width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
  font-size: 18px; display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.header-btn:hover { background: rgba(255,255,255,0.25); }
.header-btn.active { background: rgba(255,255,255,0.3); }

/* Search */
.search-wrap {
  position: relative;
}
.search-input {
  width: 100%; padding: 10px 40px 10px 36px;
  border: none; border-radius: 8px;
  background: rgba(255,255,255,0.15);
  color: var(--text-inverse);
  font-size: 15px; outline: none;
  transition: background 0.2s;
}
.search-input::placeholder { color: rgba(255,255,255,0.6); }
.search-input:focus { background: rgba(255,255,255,0.25); }
.search-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  font-size: 16px; opacity: 0.6; pointer-events: none;
}
.search-clear {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  background: rgba(255,255,255,0.2); border: none; color: var(--text-inverse);
  width: 24px; height: 24px; border-radius: 50%; cursor: pointer;
  font-size: 14px; display: none; align-items: center; justify-content: center;
}
.search-clear.show { display: flex; }

/* Tab bar */
.tab-bar {
  display: flex; background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 90;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.tab-bar::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0; padding: 10px 16px;
  font-size: 13px; font-weight: 500; color: var(--text-secondary);
  border: none; background: none; cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s; white-space: nowrap;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Main content */
.main { padding: 12px 12px calc(var(--safe-bottom) + 12px); max-width: 800px; margin: 0 auto; }

/* Views */
.view { display: none; }
.view.active { display: block; }

/* Category cards */
.cat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.cat-card {
  background: var(--bg-card); border-radius: var(--radius);
  padding: 16px 14px; cursor: pointer;
  border: 1px solid var(--border);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; overflow: hidden;
}
.cat-card:active { transform: scale(0.97); }
.cat-card:hover { box-shadow: 0 4px 12px var(--shadow); }
.cat-icon { font-size: 28px; margin-bottom: 8px; }
.cat-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.cat-name-zh { font-size: 11px; color: var(--text-secondary); margin-bottom: 6px; }
.cat-count {
  font-size: 11px; color: var(--accent); font-weight: 500;
  background: var(--accent-light); padding: 2px 8px; border-radius: 10px;
  display: inline-block;
}

/* Article list */
.article-list { display: flex; flex-direction: column; gap: 8px; }
.article-item {
  background: var(--bg-card); border-radius: var(--radius);
  padding: 14px 16px; cursor: pointer;
  border: 1px solid var(--border);
  transition: transform 0.15s;
  display: flex; align-items: flex-start; gap: 12px;
}
.article-item:active { transform: scale(0.98); }
.article-fav-btn {
  background: none; border: none; cursor: pointer;
  font-size: 18px; flex-shrink: 0; padding: 2px;
  opacity: 0.3; transition: opacity 0.2s;
}
.article-fav-btn.fav { opacity: 1; }
.article-info { flex: 1; min-width: 0; }
.article-title {
  font-size: 14px; font-weight: 600;
  margin-bottom: 4px; line-height: 1.4;
}
.article-meta {
  font-size: 11px; color: var(--text-secondary);
}
.article-preview {
  font-size: 12px; color: var(--text-secondary);
  margin-top: 6px; line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}
.article-preview mark {
  background: var(--highlight); color: var(--text);
  padding: 1px 2px; border-radius: 2px;
}

/* Article viewer */
.article-viewer {
  background: var(--bg-card); border-radius: var(--radius);
  border: 1px solid var(--border);
}
.article-viewer-header {
  padding: 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; gap: 12px;
}
.article-viewer-back {
  background: var(--accent-light); border: none; color: var(--accent);
  width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
  font-size: 16px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.article-viewer-title { font-size: 18px; font-weight: 700; flex: 1; line-height: 1.4; }
.article-viewer-meta {
  padding: 0 16px; font-size: 11px; color: var(--text-secondary);
  display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 8px;
}
.article-viewer-body {
  padding: 16px; font-size: 15px; line-height: 1.8;
  white-space: pre-wrap; word-break: break-word;
}
.article-viewer-body mark {
  background: var(--highlight); color: var(--text);
  padding: 1px 3px; border-radius: 2px;
}
.article-viewer-keywords {
  padding: 12px 16px; border-top: 1px solid var(--border);
  display: flex; flex-wrap: wrap; gap: 6px;
}
.keyword-tag {
  background: var(--accent-light); color: var(--accent);
  padding: 3px 10px; border-radius: 12px;
  font-size: 11px; font-weight: 500; cursor: pointer;
  border: none; transition: background 0.2s;
}
.keyword-tag:hover { background: var(--accent); color: white; }
.related-section {
  padding: 12px 16px; border-top: 1px solid var(--border);
}
.related-title { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; font-weight: 600; }

/* Search results */
.search-results-header {
  font-size: 13px; color: var(--text-secondary);
  margin-bottom: 10px; font-weight: 500;
}

/* Recent searches */
.recent-header {
  font-size: 13px; color: var(--text-secondary); font-weight: 600;
  margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;
}
.recent-clear {
  font-size: 11px; color: var(--accent); background: none;
  border: none; cursor: pointer;
}
.recent-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.recent-item {
  background: var(--bg-card); border: 1px solid var(--border);
  padding: 5px 12px; border-radius: 16px;
  font-size: 12px; cursor: pointer; color: var(--text);
  transition: background 0.2s;
}
.recent-item:hover { background: var(--accent-light); }

/* Glossary */
.glossary-section { margin-bottom: 20px; }
.glossary-letter {
  font-size: 14px; font-weight: 700; color: var(--accent);
  padding: 4px 0; border-bottom: 1px solid var(--border);
  margin-bottom: 6px;
}
.glossary-term {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--bg-card); border: 1px solid var(--border);
  padding: 4px 12px; border-radius: 16px;
  font-size: 12px; cursor: pointer; margin: 3px 4px 3px 0;
  color: var(--text); transition: background 0.2s;
}
.glossary-term:hover { background: var(--accent-light); }
.glossary-term .count {
  background: var(--accent); color: white;
  font-size: 9px; padding: 1px 5px; border-radius: 8px;
}

/* Favorites empty state */
.empty-state {
  text-align: center; padding: 60px 20px;
  color: var(--text-secondary);
}
.empty-state-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
.empty-state-text { font-size: 14px; }

/* Back to top */
.back-top {
  position: fixed; bottom: calc(var(--safe-bottom) + 20px); right: 20px;
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--accent); color: white; border: none;
  font-size: 18px; cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  display: none; align-items: center; justify-content: center;
  z-index: 50; transition: opacity 0.2s;
}
.back-top.show { display: flex; }

/* Category header in article list */
.list-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
}
.list-back {
  background: var(--accent-light); border: none; color: var(--accent);
  width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
  font-size: 16px; display: flex; align-items: center; justify-content: center;
}
.list-title { font-size: 16px; font-weight: 700; }
.list-count { font-size: 12px; color: var(--text-secondary); }

/* Footer */
.footer {
  text-align: center; padding: 20px;
  font-size: 10px; color: var(--text-secondary);
  line-height: 1.6;
}

/* Animations */
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeIn 0.2s ease-out; }

/* Responsive */
@media (max-width: 400px) {
  .cat-grid { grid-template-columns: 1fr; }
  .header-title { font-size: 18px; }
}
@media (min-width: 600px) {
  .cat-grid { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <span class="header-title">Pocket PPu</span>
      <span class="header-subtitle">Urology Patient Education Reference</span>
    </div>
    <div class="header-actions">
      <button class="header-btn" id="btn-theme" title="Toggle dark mode">🌙</button>
    </div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search-input" type="text"
           placeholder="Search keywords... (e.g. PSA, 荷爾蒙, docetaxel)"
           autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button class="search-clear" id="search-clear">✕</button>
  </div>
</div>

<div class="tab-bar" id="tab-bar">
  <button class="tab active" data-view="home">Home</button>
  <button class="tab" data-view="search">Search</button>
  <button class="tab" data-view="glossary">Glossary</button>
  <button class="tab" data-view="favorites">Favorites</button>
</div>

<div class="main" id="main">

  <!-- HOME VIEW -->
  <div class="view active" id="view-home">
    <div class="cat-grid" id="cat-grid"></div>
    <div class="footer">
      Content source: Taiwan Maple Urological Association (TMUA)<br>
      Developed by CY Wu
    </div>
  </div>

  <!-- CATEGORY VIEW -->
  <div class="view" id="view-category">
    <div class="list-header">
      <button class="list-back" id="cat-back">←</button>
      <div>
        <div class="list-title" id="cat-title"></div>
        <div class="list-count" id="cat-count"></div>
      </div>
    </div>
    <div class="article-list" id="cat-articles"></div>
  </div>

  <!-- SEARCH VIEW -->
  <div class="view" id="view-search">
    <div id="recent-searches"></div>
    <div class="search-results-header" id="search-header"></div>
    <div class="article-list" id="search-results"></div>
  </div>

  <!-- GLOSSARY VIEW -->
  <div class="view" id="view-glossary">
    <div id="glossary-content"></div>
  </div>

  <!-- FAVORITES VIEW -->
  <div class="view" id="view-favorites">
    <div class="article-list" id="fav-articles"></div>
    <div class="empty-state" id="fav-empty" style="display:none">
      <div class="empty-state-icon">⭐</div>
      <div class="empty-state-text">No favorites yet.<br>Tap the star icon on any article to save it.</div>
    </div>
  </div>

  <!-- ARTICLE VIEW -->
  <div class="view" id="view-article">
    <div class="article-viewer" id="article-viewer"></div>
  </div>

</div>

<button class="back-top" id="back-top">↑</button>

<script>
(function() {
  'use strict';

  // --- State ---
  let DB = null;
  let currentView = 'home';
  let previousView = 'home';
  let currentCategory = null;
  let currentArticle = null;
  let currentSearchQuery = '';
  let favorites = JSON.parse(localStorage.getItem('ppu_favorites') || '[]');
  let recentSearches = JSON.parse(localStorage.getItem('ppu_recent') || '[]');
  let theme = localStorage.getItem('ppu_theme') || 'light';

  // --- Icons ---
  const ICONS = {
    ribbon: '🎗️', dna: '🧬', droplet: '💧', stone: '🪨',
    info: 'ℹ️', pill: '💊', shield: '🛡️', syringe: '💉',
    flask: '🧪', book: '📘', heart: '❤️'
  };

  // --- Init ---
  async function init() {
    applyTheme();
    try {
      const resp = await fetch('data.json');
      DB = await resp.json();
      buildCategoryGrid();
      buildGlossary();
      renderRecentSearches();
    } catch (e) {
      document.getElementById('cat-grid').innerHTML =
        '<div class="empty-state"><div class="empty-state-text">Failed to load data. Please refresh.</div></div>';
    }
    bindEvents();
  }

  // --- Theme ---
  function applyTheme() {
    document.documentElement.setAttribute('data-theme', theme);
    document.getElementById('btn-theme').textContent = theme === 'dark' ? '☀️' : '🌙';
    document.querySelector('meta[name="theme-color"]').content = theme === 'dark' ? '#0f3460' : '#1a5276';
  }
  function toggleTheme() {
    theme = theme === 'dark' ? 'light' : 'dark';
    localStorage.setItem('ppu_theme', theme);
    applyTheme();
  }

  // --- Categories ---
  function buildCategoryGrid() {
    const grid = document.getElementById('cat-grid');
    grid.innerHTML = DB.categories.map(cat => `
      <div class="cat-card fade-in" data-cat="${cat.id}">
        <div class="cat-icon">${ICONS[cat.icon] || '📄'}</div>
        <div class="cat-name">${cat.name_en}</div>
        <div class="cat-name-zh">${cat.name_zh}</div>
        <span class="cat-count">${cat.count} articles</span>
      </div>
    `).join('');
  }

  function showCategory(catId) {
    currentCategory = DB.categories.find(c => c.id === catId);
    if (!currentCategory) return;
    document.getElementById('cat-title').textContent = currentCategory.name_en;
    document.getElementById('cat-count').textContent = `${currentCategory.name_zh} · ${currentCategory.count} articles`;
    const articles = currentCategory.articles.map(id => DB.articles.find(a => a.id === id)).filter(Boolean);
    document.getElementById('cat-articles').innerHTML = articles.map(a => articleItemHTML(a)).join('');
    switchView('category');
  }

  // --- Articles ---
  function articleItemHTML(article, query) {
    const isFav = favorites.includes(article.id);
    let preview = '';
    if (query) {
      preview = getSearchPreview(article.text, query);
    }
    return `
      <div class="article-item fade-in" data-id="${article.id}">
        <button class="article-fav-btn ${isFav ? 'fav' : ''}" data-fav="${article.id}" title="Toggle favorite">
          ${isFav ? '⭐' : '☆'}
        </button>
        <div class="article-info">
          <div class="article-title">${query ? highlightText(article.title, query) : article.title}</div>
          <div class="article-meta">${getCatName(article.category)} · ${article.pages}p</div>
          ${preview ? `<div class="article-preview">${preview}</div>` : ''}
        </div>
      </div>
    `;
  }

  function showArticle(articleId, query) {
    const article = DB.articles.find(a => a.id === articleId);
    if (!article) return;
    currentArticle = article;

    const isFav = favorites.includes(article.id);
    let bodyText = article.text;
    if (query) {
      bodyText = highlightText(bodyText, query);
    }

    const relatedHTML = article.related && article.related.length > 0
      ? `<div class="related-section">
           <div class="related-title">Related Articles</div>
           <div class="article-list">${article.related.map(rid => {
             const r = DB.articles.find(a => a.id === rid);
             return r ? articleItemHTML(r) : '';
           }).join('')}</div>
         </div>` : '';

    document.getElementById('article-viewer').innerHTML = `
      <div class="article-viewer-header">
        <button class="article-viewer-back" id="article-back">←</button>
        <div class="article-viewer-title">${article.title}</div>
        <button class="article-fav-btn ${isFav ? 'fav' : ''}" data-fav="${article.id}" style="font-size:22px;opacity:${isFav?1:0.4}">
          ${isFav ? '⭐' : '☆'}
        </button>
      </div>
      <div class="article-viewer-meta">
        <span>${getCatName(article.category)}</span>
        <span>${article.pages} page${article.pages > 1 ? 's' : ''}</span>
        <span>${article.text.length.toLocaleString()} chars</span>
      </div>
      <div class="article-viewer-body">${bodyText}</div>
      ${article.keywords.length > 0 ? `
        <div class="article-viewer-keywords">
          ${article.keywords.map(k => `<button class="keyword-tag" data-kw="${k}">${k}</button>`).join('')}
        </div>
      ` : ''}
      ${relatedHTML}
    `;
    switchView('article');
    window.scrollTo(0, 0);
  }

  // --- Search ---
  let searchTimeout;
  function handleSearch(query) {
    query = query.trim();
    currentSearchQuery = query;
    document.getElementById('search-clear').classList.toggle('show', query.length > 0);

    if (!query) {
      switchView(previousView === 'search' ? 'home' : previousView);
      return;
    }

    if (currentView !== 'search') {
      switchView('search');
    }

    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => performSearch(query), 150);
  }

  function performSearch(query) {
    if (!DB) return;
    const q = query.toLowerCase();
    const results = [];

    for (const article of DB.articles) {
      let score = 0;
      const titleLower = article.title.toLowerCase();
      const textLower = article.text.toLowerCase();

      // Title match (highest weight)
      if (titleLower.includes(q)) score += 100;
      // Keyword match
      if (article.keywords.some(k => k.toLowerCase().includes(q))) score += 50;
      // Text match (count occurrences, cap at 20)
      const matches = textLower.split(q).length - 1;
      if (matches > 0) score += Math.min(matches * 5, 100);

      if (score > 0) {
        results.push({ article, score });
      }
    }

    results.sort((a, b) => b.score - a.score);

    const header = document.getElementById('search-header');
    const container = document.getElementById('search-results');

    if (results.length === 0) {
      header.textContent = `No results for "${query}"`;
      container.innerHTML = '';
    } else {
      header.textContent = `${results.length} result${results.length > 1 ? 's' : ''} for "${query}"`;
      container.innerHTML = results.map(r => articleItemHTML(r.article, query)).join('');
    }

    // Save to recent
    addRecentSearch(query);
  }

  function getSearchPreview(text, query) {
    const q = query.toLowerCase();
    const idx = text.toLowerCase().indexOf(q);
    if (idx === -1) return '';
    const start = Math.max(0, idx - 40);
    const end = Math.min(text.length, idx + query.length + 80);
    let snippet = (start > 0 ? '...' : '') + text.slice(start, end) + (end < text.length ? '...' : '');
    return highlightText(snippet, query);
  }

  function highlightText(text, query) {
    if (!query) return text;
    const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const regex = new RegExp(`(${escaped})`, 'gi');
    return text.replace(regex, '<mark>$1</mark>');
  }

  // --- Recent Searches ---
  function addRecentSearch(query) {
    recentSearches = recentSearches.filter(q => q !== query);
    recentSearches.unshift(query);
    if (recentSearches.length > 10) recentSearches = recentSearches.slice(0, 10);
    localStorage.setItem('ppu_recent', JSON.stringify(recentSearches));
    renderRecentSearches();
  }

  function renderRecentSearches() {
    const container = document.getElementById('recent-searches');
    if (!recentSearches.length) {
      container.innerHTML = '';
      return;
    }
    container.innerHTML = `
      <div class="recent-header">
        <span>Recent Searches</span>
        <button class="recent-clear" id="clear-recent">Clear All</button>
      </div>
      <div class="recent-list">
        ${recentSearches.map(q => `<button class="recent-item" data-recent="${q}">${q}</button>`).join('')}
      </div>
    `;
  }

  // --- Glossary ---
  function buildGlossary() {
    const container = document.getElementById('glossary-content');
    const glossary = DB.glossary;
    const terms = Object.keys(glossary).sort((a, b) => {
      const aIsEn = /^[a-zA-Z]/.test(a);
      const bIsEn = /^[a-zA-Z]/.test(b);
      if (aIsEn && !bIsEn) return -1;
      if (!aIsEn && bIsEn) return 1;
      return a.localeCompare(b, 'zh-TW');
    });

    // Group: English first, then Chinese
    const groups = {};
    terms.forEach(term => {
      const isEn = /^[a-zA-Z]/.test(term);
      const letter = isEn ? term[0].toUpperCase() : '中文術語';
      if (!groups[letter]) groups[letter] = [];
      groups[letter].push(term);
    });

    let html = '';
    for (const [letter, terms] of Object.entries(groups)) {
      html += `<div class="glossary-section">
        <div class="glossary-letter">${letter}</div>
        <div>${terms.map(t => `
          <button class="glossary-term" data-kw="${t}">
            ${t} <span class="count">${glossary[t].length}</span>
          </button>
        `).join('')}</div>
      </div>`;
    }
    container.innerHTML = html;
  }

  // --- Favorites ---
  function toggleFavorite(articleId) {
    const idx = favorites.indexOf(articleId);
    if (idx >= 0) favorites.splice(idx, 1);
    else favorites.push(articleId);
    localStorage.setItem('ppu_favorites', JSON.stringify(favorites));
    renderFavorites();
  }

  function renderFavorites() {
    const container = document.getElementById('fav-articles');
    const empty = document.getElementById('fav-empty');
    if (favorites.length === 0) {
      container.innerHTML = '';
      empty.style.display = 'block';
    } else {
      empty.style.display = 'none';
      const articles = favorites.map(id => DB.articles.find(a => a.id === id)).filter(Boolean);
      container.innerHTML = articles.map(a => articleItemHTML(a)).join('');
    }
  }

  // --- View management ---
  function switchView(name) {
    if (name !== 'article' && name !== 'search') previousView = currentView;
    currentView = name;
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));

    const viewMap = {
      home: 'view-home',
      category: 'view-category',
      search: 'view-search',
      glossary: 'view-glossary',
      favorites: 'view-favorites',
      article: 'view-article'
    };
    const el = document.getElementById(viewMap[name]);
    if (el) el.classList.add('active');

    // Update tabs
    document.querySelectorAll('.tab').forEach(t => {
      t.classList.toggle('active', t.dataset.view === name ||
        (name === 'category' && t.dataset.view === 'home') ||
        (name === 'article' && t.dataset.view === (previousView || 'home'))
      );
    });

    if (name === 'favorites') renderFavorites();
  }

  // --- Helpers ---
  function getCatName(catId) {
    const cat = DB.categories.find(c => c.id === catId);
    return cat ? cat.name_zh : catId;
  }

  // --- Events ---
  function bindEvents() {
    // Search input
    const searchInput = document.getElementById('search-input');
    searchInput.addEventListener('input', () => handleSearch(searchInput.value));
    searchInput.addEventListener('focus', () => {
      if (!searchInput.value && currentView !== 'search') {
        renderRecentSearches();
        switchView('search');
      }
    });

    // Search clear
    document.getElementById('search-clear').addEventListener('click', () => {
      searchInput.value = '';
      handleSearch('');
      searchInput.focus();
    });

    // Theme toggle
    document.getElementById('btn-theme').addEventListener('click', toggleTheme);

    // Tabs
    document.getElementById('tab-bar').addEventListener('click', e => {
      const tab = e.target.closest('.tab');
      if (!tab) return;
      const view = tab.dataset.view;
      if (view === 'home') {
        searchInput.value = '';
        document.getElementById('search-clear').classList.remove('show');
      }
      switchView(view);
    });

    // Category cards
    document.getElementById('cat-grid').addEventListener('click', e => {
      const card = e.target.closest('.cat-card');
      if (card) showCategory(card.dataset.cat);
    });

    // Category back
    document.getElementById('cat-back').addEventListener('click', () => switchView('home'));

    // Article clicks (delegation)
    document.getElementById('main').addEventListener('click', e => {
      // Favorite button
      const favBtn = e.target.closest('[data-fav]');
      if (favBtn) {
        e.stopPropagation();
        toggleFavorite(favBtn.dataset.fav);
        // Update UI
        favBtn.classList.toggle('fav');
        const isFav = favorites.includes(favBtn.dataset.fav);
        favBtn.textContent = isFav ? '⭐' : '☆';
        favBtn.style.opacity = isFav ? 1 : 0.3;
        return;
      }

      // Keyword tag
      const kwTag = e.target.closest('[data-kw]');
      if (kwTag) {
        searchInput.value = kwTag.dataset.kw;
        handleSearch(kwTag.dataset.kw);
        return;
      }

      // Article back
      if (e.target.closest('#article-back')) {
        switchView(previousView || 'home');
        return;
      }

      // Recent search
      const recent = e.target.closest('[data-recent]');
      if (recent) {
        searchInput.value = recent.dataset.recent;
        handleSearch(recent.dataset.recent);
        return;
      }

      // Clear recent
      if (e.target.closest('#clear-recent')) {
        recentSearches = [];
        localStorage.setItem('ppu_recent', '[]');
        renderRecentSearches();
        return;
      }

      // Article item
      const item = e.target.closest('.article-item');
      if (item) {
        showArticle(item.dataset.id, currentView === 'search' ? currentSearchQuery : '');
        return;
      }
    });

    // Back to top
    const backTop = document.getElementById('back-top');
    window.addEventListener('scroll', () => {
      backTop.classList.toggle('show', window.scrollY > 300);
    });
    backTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

    // Keyboard shortcut: Cmd/Ctrl+K to focus search
    document.addEventListener('keydown', e => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        searchInput.focus();
      }
      if (e.key === 'Escape') {
        searchInput.blur();
        if (currentView === 'article') switchView(previousView || 'home');
      }
    });
  }

  // Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }

  // Start
  init();
})();
</script>
</body>
</html>
