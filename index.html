<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a5276">
<title>Pocket PPu</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root {
  --bg: #f5f7fa;
  --bg-card: #ffffff;
  --bg-header: #1a5276;
  --bg-search: #ffffff;
  --text: #2c3e50;
  --text-secondary: #7f8c8d;
  --text-inverse: #ffffff;
  --accent: #2980b9;
  --accent-light: #ebf5fb;
  --border: #e0e4e8;
  --highlight: #fff3cd;
  --shadow: rgba(0,0,0,0.08);
  --cat-gradient: linear-gradient(135deg, #2980b9, #1a5276);
  --radius: 12px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --danger: #e74c3c;
  --danger-light: #fdedec;
  --success: #27ae60;
  --success-light: #eafaf1;
  --warning: #f39c12;
  --warning-light: #fef9e7;
}
[data-theme="dark"] {
  --bg: #1a1a2e;
  --bg-card: #16213e;
  --bg-header: #0f3460;
  --bg-search: #16213e;
  --text: #e0e0e0;
  --text-secondary: #95a5a6;
  --text-inverse: #ffffff;
  --accent: #3498db;
  --accent-light: #1a2d4a;
  --border: #2c3e50;
  --highlight: #4a3f00;
  --shadow: rgba(0,0,0,0.3);
  --cat-gradient: linear-gradient(135deg, #0f3460, #1a1a2e);
  --danger: #e74c3c;
  --danger-light: #3a1a1a;
  --success: #2ecc71;
  --success-light: #1a3a2a;
  --warning: #f39c12;
  --warning-light: #3a3010;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Header */
.header {
  background: var(--bg-header);
  color: var(--text-inverse);
  padding: calc(var(--safe-top) + 12px) 16px 12px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 8px var(--shadow);
}
.header-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.header-title {
  font-size: 20px; font-weight: 700; letter-spacing: 0.5px;
}
.header-subtitle {
  font-size: 10px; opacity: 0.7; font-weight: 400; display: block;
}
.header-actions { display: flex; gap: 8px; }
.header-btn {
  background: rgba(255,255,255,0.15); border: none; color: var(--text-inverse);
  width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
  font-size: 18px; display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.header-btn:hover { background: rgba(255,255,255,0.25); }
.header-btn.active { background: rgba(255,255,255,0.3); }

/* Search */
.search-wrap {
  position: relative;
}
.search-input {
  width: 100%; padding: 10px 40px 10px 36px;
  border: none; border-radius: 8px;
  background: rgba(255,255,255,0.15);
  color: var(--text-inverse);
  font-size: 15px; outline: none;
  transition: background 0.2s;
}
.search-input::placeholder { color: rgba(255,255,255,0.6); }
.search-input:focus { background: rgba(255,255,255,0.25); }
.search-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  font-size: 16px; opacity: 0.6; pointer-events: none;
}
.search-clear {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  background: rgba(255,255,255,0.2); border: none; color: var(--text-inverse);
  width: 24px; height: 24px; border-radius: 50%; cursor: pointer;
  font-size: 14px; display: none; align-items: center; justify-content: center;
}
.search-clear.show { display: flex; }

/* Tab bar */
.tab-bar {
  display: flex; background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 90;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.tab-bar::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0; padding: 10px 16px;
  font-size: 13px; font-weight: 500; color: var(--text-secondary);
  border: none; background: none; cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s; white-space: nowrap;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab[data-view="notes"] { color: var(--success); }
.tab[data-view="notes"].active { color: var(--success); border-bottom-color: var(--success); }

/* Main content */
.main { padding: 12px 12px calc(var(--safe-bottom) + 12px); max-width: 800px; margin: 0 auto; }

/* Views */
.view { display: none; }
.view.active { display: block; }

/* Category cards */
.cat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.cat-card {
  background: var(--bg-card); border-radius: var(--radius);
  padding: 16px 14px; cursor: pointer;
  border: 1px solid var(--border);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; overflow: hidden;
}
.cat-card:active { transform: scale(0.97); }
.cat-card:hover { box-shadow: 0 4px 12px var(--shadow); }
.cat-icon { font-size: 28px; margin-bottom: 8px; }
.cat-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.cat-name-zh { font-size: 11px; color: var(--text-secondary); margin-bottom: 6px; }
.cat-count {
  font-size: 11px; color: var(--accent); font-weight: 500;
  background: var(--accent-light); padding: 2px 8px; border-radius: 10px;
  display: inline-block;
}

/* Article list */
.article-list { display: flex; flex-direction: column; gap: 8px; }
.article-item {
  background: var(--bg-card); border-radius: var(--radius);
  padding: 14px 16px; cursor: pointer;
  border: 1px solid var(--border);
  transition: transform 0.15s;
  display: flex; align-items: flex-start; gap: 12px;
}
.article-item:active { transform: scale(0.98); }
.article-fav-btn {
  background: none; border: none; cursor: pointer;
  font-size: 18px; flex-shrink: 0; padding: 2px;
  opacity: 0.3; transition: opacity 0.2s;
}
.article-fav-btn.fav { opacity: 1; }
.article-info { flex: 1; min-width: 0; }
.article-title {
  font-size: 14px; font-weight: 600;
  margin-bottom: 4px; line-height: 1.4;
}
.article-meta {
  font-size: 11px; color: var(--text-secondary);
}
.article-preview {
  font-size: 12px; color: var(--text-secondary);
  margin-top: 6px; line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}
.article-preview mark {
  background: var(--highlight); color: var(--text);
  padding: 1px 2px; border-radius: 2px;
}

/* Article viewer */
.article-viewer {
  background: var(--bg-card); border-radius: var(--radius);
  border: 1px solid var(--border);
}
.article-viewer-header {
  padding: 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; gap: 12px;
}
.article-viewer-back {
  background: var(--accent-light); border: none; color: var(--accent);
  width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
  font-size: 16px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.article-viewer-title { font-size: 18px; font-weight: 700; flex: 1; line-height: 1.4; }
.article-viewer-meta {
  padding: 0 16px; font-size: 11px; color: var(--text-secondary);
  display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 8px;
}
.article-viewer-body {
  padding: 16px; font-size: 15px; line-height: 1.8;
  white-space: pre-wrap; word-break: break-word;
}
.article-viewer-body mark {
  background: var(--highlight); color: var(--text);
  padding: 1px 3px; border-radius: 2px;
}
.article-viewer-keywords {
  padding: 12px 16px; border-top: 1px solid var(--border);
  display: flex; flex-wrap: wrap; gap: 6px;
}
.keyword-tag {
  background: var(--accent-light); color: var(--accent);
  padding: 3px 10px; border-radius: 12px;
  font-size: 11px; font-weight: 500; cursor: pointer;
  border: none; transition: background 0.2s;
}
.keyword-tag:hover { background: var(--accent); color: white; }
.related-section {
  padding: 12px 16px; border-top: 1px solid var(--border);
}
.related-title { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; font-weight: 600; }

/* Search results */
.search-results-header {
  font-size: 13px; color: var(--text-secondary);
  margin-bottom: 10px; font-weight: 500;
}

/* Search source group headers */
.search-group-header {
  font-size: 12px; font-weight: 700; color: var(--accent);
  padding: 10px 0 6px; margin-top: 8px;
  border-bottom: 1px solid var(--border);
}
.search-group-header:first-child { margin-top: 0; }

/* Source badge */
.source-badge {
  display: inline-block; font-size: 10px; font-weight: 600;
  padding: 2px 7px; border-radius: 8px; margin-left: 6px;
  vertical-align: middle;
}
.source-badge.patient-ed {
  background: var(--accent-light); color: var(--accent);
}
.source-badge.teaching-notes {
  background: var(--warning-light); color: var(--warning);
}

/* Recent searches */
.recent-header {
  font-size: 13px; color: var(--text-secondary); font-weight: 600;
  margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;
}
.recent-clear {
  font-size: 11px; color: var(--accent); background: none;
  border: none; cursor: pointer;
}
.recent-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.recent-item {
  background: var(--bg-card); border: 1px solid var(--border);
  padding: 5px 12px; border-radius: 16px;
  font-size: 12px; cursor: pointer; color: var(--text);
  transition: background 0.2s;
}
.recent-item:hover { background: var(--accent-light); }

/* Glossary */
.glossary-section { margin-bottom: 20px; }
.glossary-letter {
  font-size: 14px; font-weight: 700; color: var(--accent);
  padding: 4px 0; border-bottom: 1px solid var(--border);
  margin-bottom: 6px;
}
.glossary-term {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--bg-card); border: 1px solid var(--border);
  padding: 4px 12px; border-radius: 16px;
  font-size: 12px; cursor: pointer; margin: 3px 4px 3px 0;
  color: var(--text); transition: background 0.2s;
}
.glossary-term:hover { background: var(--accent-light); }
.glossary-term .count {
  background: var(--accent); color: white;
  font-size: 9px; padding: 1px 5px; border-radius: 8px;
}

/* Favorites empty state */
.empty-state {
  text-align: center; padding: 60px 20px;
  color: var(--text-secondary);
}
.empty-state-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
.empty-state-text { font-size: 14px; }

/* Back to top */
.back-top {
  position: fixed; bottom: calc(var(--safe-bottom) + 20px); right: 20px;
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--accent); color: white; border: none;
  font-size: 18px; cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  display: none; align-items: center; justify-content: center;
  z-index: 50; transition: opacity 0.2s;
}
.back-top.show { display: flex; }

/* Category header in article list */
.list-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
}
.list-back {
  background: var(--accent-light); border: none; color: var(--accent);
  width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
  font-size: 16px; display: flex; align-items: center; justify-content: center;
}
.list-title { font-size: 16px; font-weight: 700; }
.list-count { font-size: 12px; color: var(--text-secondary); }

/* Footer */
.footer {
  text-align: center; padding: 20px;
  font-size: 10px; color: var(--text-secondary);
  line-height: 1.6;
}

/* === Teaching Notes styles === */
.notes-grid { display: flex; flex-direction: column; gap: 10px; }
.note-card {
  background: var(--bg-card); border-radius: var(--radius);
  padding: 16px; cursor: pointer;
  border: 1px solid var(--border);
  transition: transform 0.15s, box-shadow 0.15s;
  display: flex; align-items: center; gap: 14px;
}
.note-card:active { transform: scale(0.98); }
.note-card:hover { box-shadow: 0 4px 12px var(--shadow); }
.note-number {
  font-size: 22px; font-weight: 800; color: var(--accent);
  background: var(--accent-light);
  width: 44px; height: 44px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.note-card-info { flex: 1; min-width: 0; }
.note-card-title { font-size: 14px; font-weight: 600; line-height: 1.4; margin-bottom: 4px; }
.note-card-meta { font-size: 11px; color: var(--text-secondary); }

/* Notes action bar */
.notes-actions {
  display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap;
}
.notes-actions .btn {
  flex: 1; min-width: 120px; padding: 10px 14px;
  border-radius: var(--radius); font-size: 13px; font-weight: 600;
  cursor: pointer; border: none; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.btn-accent {
  background: var(--accent); color: white;
}
.btn-accent:hover { opacity: 0.9; }
.btn-outline {
  background: var(--bg-card); color: var(--accent);
  border: 1px solid var(--accent) !important;
}
.btn-outline:hover { background: var(--accent-light); }

/* Local changes indicator */
.local-indicator {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; font-weight: 600; color: var(--warning);
  background: var(--warning-light); padding: 3px 10px; border-radius: 10px;
  margin-bottom: 12px;
}

/* Note detail view */
.note-detail {
  background: var(--bg-card); border-radius: var(--radius);
  border: 1px solid var(--border);
}
.note-detail-header {
  padding: 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; gap: 12px;
}
.note-detail-title { font-size: 18px; font-weight: 700; flex: 1; line-height: 1.4; }
.note-detail-actions { display: flex; gap: 6px; flex-shrink: 0; }
.note-detail-btn {
  background: var(--accent-light); border: none; color: var(--accent);
  width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
  font-size: 15px; display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.note-detail-btn:hover { background: var(--accent); color: white; }
.note-detail-body { padding: 16px; }
.note-subsection { margin-bottom: 20px; }
.note-subsection:last-child { margin-bottom: 0; }
.note-subsection h4 {
  font-size: 14px; font-weight: 700; color: var(--accent);
  margin-bottom: 8px; line-height: 1.4;
}
.note-subsection ul {
  list-style: none; padding: 0;
}
.note-subsection li {
  font-size: 14px; line-height: 1.7;
  padding: 4px 0 4px 20px;
  position: relative; color: var(--text);
}
.note-subsection li::before {
  content: '';
  position: absolute; left: 6px; top: 12px;
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--accent);
}
.note-subsection li mark {
  background: var(--highlight); color: var(--text);
  padding: 1px 3px; border-radius: 2px;
}

/* Note edit view */
.note-edit {
  background: var(--bg-card); border-radius: var(--radius);
  border: 1px solid var(--border);
}
.note-edit-header {
  padding: 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
}
.note-edit-header-title {
  font-size: 16px; font-weight: 700; flex: 1;
}
.note-edit-body { padding: 16px; }
.note-edit-field { margin-bottom: 16px; }
.note-edit-field label {
  display: block; font-size: 12px; font-weight: 600;
  color: var(--text-secondary); margin-bottom: 6px;
}
.note-edit-field input[type="text"],
.note-edit-field textarea {
  width: 100%; padding: 10px 12px;
  border: 1px solid var(--border); border-radius: 8px;
  background: var(--bg); color: var(--text);
  font-size: 14px; font-family: inherit;
  outline: none; transition: border-color 0.2s;
}
.note-edit-field input[type="text"]:focus,
.note-edit-field textarea:focus {
  border-color: var(--accent);
}
.note-edit-field textarea {
  min-height: 100px; resize: vertical; line-height: 1.6;
}
.subsection-edit-block {
  background: var(--bg); border-radius: var(--radius);
  padding: 14px; margin-bottom: 12px;
  border: 1px solid var(--border);
  position: relative;
}
.subsection-edit-block .subsection-number {
  font-size: 11px; color: var(--text-secondary); font-weight: 600;
  margin-bottom: 8px;
}
.subsection-delete-btn {
  position: absolute; top: 10px; right: 10px;
  background: var(--danger-light); border: none; color: var(--danger);
  width: 26px; height: 26px; border-radius: 50%; cursor: pointer;
  font-size: 13px; display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.subsection-delete-btn:hover { background: var(--danger); color: white; }
.note-edit-actions {
  display: flex; gap: 8px; padding: 16px;
  border-top: 1px solid var(--border);
}
.note-edit-actions .btn {
  flex: 1; padding: 12px; border-radius: var(--radius);
  font-size: 14px; font-weight: 600; cursor: pointer;
  border: none; transition: all 0.2s;
  text-align: center;
}
.btn-success { background: var(--success); color: white; }
.btn-success:hover { opacity: 0.9; }
.btn-secondary { background: var(--bg); color: var(--text-secondary); border: 1px solid var(--border) !important; }
.btn-secondary:hover { background: var(--border); }
.btn-danger { background: var(--danger); color: white; }
.btn-danger:hover { opacity: 0.9; }

.add-subsection-btn {
  width: 100%; padding: 10px; border-radius: 8px;
  background: var(--accent-light); color: var(--accent);
  border: 1px dashed var(--accent); cursor: pointer;
  font-size: 13px; font-weight: 600;
  transition: background 0.2s; margin-top: 4px;
}
.add-subsection-btn:hover { background: var(--accent); color: white; }

/* Animations */
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeIn 0.2s ease-out; }

/* Responsive */
@media (max-width: 400px) {
  .cat-grid { grid-template-columns: 1fr; }
  .header-title { font-size: 18px; }
}
@media (min-width: 600px) {
  .cat-grid { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>
<body>

<!-- ACCESS GATE -->
<div id="access-gate" style="display:none;position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,#1a5276,#2980b9);display:flex;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:16px;padding:40px 32px;max-width:340px;width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.2);">
    <div style="font-size:36px;font-weight:700;color:#1a5276;margin-bottom:4px;">Pocket PPu</div>
    <div style="font-size:13px;color:#7f8c8d;margin-bottom:24px;">Urology Patient Education Reference</div>
    <input id="access-code-input" type="text" placeholder="Enter access code"
      style="width:100%;padding:12px 16px;border:2px solid #e0e4e8;border-radius:8px;font-size:16px;text-align:center;outline:none;margin-bottom:12px;letter-spacing:2px;"
      autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
    <div id="access-error" style="color:#e74c3c;font-size:12px;min-height:18px;margin-bottom:12px;"></div>
    <button id="access-submit" style="width:100%;padding:12px;background:#1a5276;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;">Enter</button>
    <div style="margin-top:20px;font-size:10px;color:#bdc3c7;">Contact the administrator for access</div>
  </div>
</div>

<div class="header">
  <div class="header-top">
    <div>
      <span class="header-title">Pocket PPu</span>
      <span class="header-subtitle">Urology Patient Education Reference</span>
    </div>
    <div class="header-actions">
      <button class="header-btn" id="btn-theme" title="Toggle dark mode">🌙</button>
    </div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search-input" type="text"
           placeholder="Search keywords... (e.g. PSA, 荷爾蒙, docetaxel)"
           autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button class="search-clear" id="search-clear">✕</button>
  </div>
</div>

<div class="tab-bar" id="tab-bar">
  <button class="tab active" data-view="home">Home</button>
  <button class="tab" data-view="search">Search</button>
  <button class="tab" data-view="notes">Notes</button>
  <button class="tab" data-view="glossary">Glossary</button>
  <button class="tab" data-view="favorites">Favorites</button>
</div>

<div class="main" id="main">

  <!-- HOME VIEW -->
  <div class="view active" id="view-home">
    <div class="cat-grid" id="cat-grid"></div>
    <div class="footer">
      Content source: Taiwan Maple Urological Association (TMUA)<br>
      Developed by CY Wu
    </div>
  </div>

  <!-- CATEGORY VIEW -->
  <div class="view" id="view-category">
    <div class="list-header">
      <button class="list-back" id="cat-back">←</button>
      <div>
        <div class="list-title" id="cat-title"></div>
        <div class="list-count" id="cat-count"></div>
      </div>
    </div>
    <div class="article-list" id="cat-articles"></div>
  </div>

  <!-- SEARCH VIEW -->
  <div class="view" id="view-search">
    <div id="recent-searches"></div>
    <div class="search-results-header" id="search-header"></div>
    <div id="search-results"></div>
  </div>

  <!-- NOTES VIEW -->
  <div class="view" id="view-notes">
    <div id="notes-local-indicator"></div>
    <div class="notes-grid" id="notes-grid"></div>
    <div class="notes-actions" id="notes-actions">
      <button class="btn btn-outline" id="btn-add-section" style="display:none">+ Add Section</button>
      <button class="btn btn-accent" id="btn-sync-github" style="display:none">⬆ Sync to GitHub</button>
      <button class="btn btn-outline" id="btn-suggest-note" onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLSd5EDJWg4m2td7gLAa4m43oYjmaI3FO4rvp6NrZCdfBJAZwbA/viewform','_blank')" style="width:100%">📋 投稿建議</button>
    </div>
  </div>

  <!-- NOTE DETAIL VIEW -->
  <div class="view" id="view-note-detail">
    <div class="note-detail" id="note-detail"></div>
  </div>

  <!-- NOTE EDIT VIEW -->
  <div class="view" id="view-note-edit">
    <div class="note-edit" id="note-edit"></div>
  </div>

  <!-- GLOSSARY VIEW -->
  <div class="view" id="view-glossary">
    <div id="glossary-content"></div>
  </div>

  <!-- FAVORITES VIEW -->
  <div class="view" id="view-favorites">
    <div class="article-list" id="fav-articles"></div>
    <div class="empty-state" id="fav-empty" style="display:none">
      <div class="empty-state-icon">⭐</div>
      <div class="empty-state-text">No favorites yet.<br>Tap the star icon on any article to save it.</div>
    </div>
  </div>

  <!-- ARTICLE VIEW -->
  <div class="view" id="view-article">
    <div class="article-viewer" id="article-viewer"></div>
  </div>

</div>

<button class="back-top" id="back-top">↑</button>

<script>
(function() {
  'use strict';

  // --- State ---
  let DB = null;
  let NOTES = null;
  let notesSource = 'server'; // 'server' or 'local'
  let currentView = 'home';
  let previousView = 'home';
  let currentCategory = null;
  let currentArticle = null;
  let currentSearchQuery = '';
  let currentNoteId = null;
  let favorites = JSON.parse(localStorage.getItem('ppu_favorites') || '[]');
  let noteFavorites = JSON.parse(localStorage.getItem('ppu_note_favorites') || '[]');
  let recentSearches = JSON.parse(localStorage.getItem('ppu_recent') || '[]');
  let theme = localStorage.getItem('ppu_theme') || 'light';

  // --- Icons ---
  const ICONS = {
    ribbon: '🎗️', dna: '🧬', droplet: '💧', stone: '🪨',
    info: 'ℹ️', pill: '💊', shield: '🛡️', syringe: '💉',
    flask: '🧪', book: '📘', heart: '❤️'
  };

  // --- Force reset: add ?reset to URL to clear all caches ---
  if (window.location.search.includes('reset')) {
    (async () => {
      const regs = await navigator.serviceWorker.getRegistrations();
      for (const reg of regs) await reg.unregister();
      const keys = await caches.keys();
      for (const key of keys) await caches.delete(key);
      localStorage.removeItem('ppu_teaching_notes');
      // Don't clear access code on reset
      window.location.href = window.location.pathname;
    })();
    return;
  }

  // --- Access Control ---
  // ADMIN: Edit this list to add/remove access codes
  // ===== ACCESS CODES (員編) =====
  // Format: 'EMPLOYEE_ID',  // Name
  // To add: add a new line, save, git push
  // To remove: delete the line, save, git push
  const VALID_CODES = [
    'ADMIN',        // 管理員
    '123944',       // 總院吳
    'Y08594',       // 雲林吳
  ];
  // ===== END ACCESS CODES =====

  // Google Sheet logging endpoint (Apps Script web app URL)
  // Set this after deploying the Apps Script
  const LOG_ENDPOINT = '';

  function logAccess(code) {
    if (!LOG_ENDPOINT) return;
    const data = {
      code: code,
      time: new Date().toISOString(),
      device: navigator.userAgent.includes('iPhone') ? 'iPhone' :
              navigator.userAgent.includes('Android') ? 'Android' :
              navigator.userAgent.includes('Mac') ? 'Mac' :
              navigator.userAgent.includes('Windows') ? 'Windows' : 'Other',
      ua: navigator.userAgent.substring(0, 150)
    };
    fetch(LOG_ENDPOINT, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    }).catch(() => {});
  }

  function checkAccess() {
    const saved = localStorage.getItem('ppu_access_code');
    if (saved && VALID_CODES.includes(saved.toUpperCase())) {
      // Already authenticated
      document.getElementById('access-gate').style.display = 'none';
      return true;
    }
    // Show gate
    document.getElementById('access-gate').style.display = 'flex';
    const input = document.getElementById('access-code-input');
    const error = document.getElementById('access-error');
    const submit = document.getElementById('access-submit');

    function tryAccess() {
      const code = input.value.trim().toUpperCase();
      if (!code) {
        error.textContent = 'Please enter an access code';
        return;
      }
      if (VALID_CODES.includes(code)) {
        localStorage.setItem('ppu_access_code', code);
        document.getElementById('access-gate').style.display = 'none';
        logAccess(code);
        init();
      } else {
        error.textContent = 'Invalid access code';
        input.value = '';
        input.focus();
      }
    }

    submit.addEventListener('click', tryAccess);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') tryAccess(); });
    input.focus();
    return false;
  }

  if (!checkAccess()) return;

  // --- Init ---
  async function init() {
    applyTheme();
    try {
      const [dataResp, notesResp] = await Promise.all([
        fetch('data.json'),
        fetch('teaching-notes.json')
      ]);
      DB = await dataResp.json();
      const serverNotes = await notesResp.json();

      // Check localStorage for local edits
      // Only use local version if it's STRICTLY newer than server
      const localNotesRaw = localStorage.getItem('ppu_teaching_notes');
      if (localNotesRaw) {
        try {
          const localNotes = JSON.parse(localNotesRaw);
          if (localNotes.updated && localNotes.updated > serverNotes.updated) {
            NOTES = localNotes;
            notesSource = 'local';
          } else {
            // Server is same or newer — use server, clear stale local
            NOTES = serverNotes;
            notesSource = 'server';
            localStorage.removeItem('ppu_teaching_notes');
          }
        } catch (e) {
          NOTES = serverNotes;
          notesSource = 'server';
          localStorage.removeItem('ppu_teaching_notes');
        }
      } else {
        NOTES = serverNotes;
        notesSource = 'server';
      }

      buildCategoryGrid();
      buildGlossary();
      buildNotesGrid();
      renderRecentSearches();
      updateAdminUI();
    } catch (e) {
      document.getElementById('cat-grid').innerHTML =
        '<div class="empty-state"><div class="empty-state-text">Failed to load data. Please refresh.</div></div>';
    }
    bindEvents();
  }

  // --- Theme ---
  function applyTheme() {
    document.documentElement.setAttribute('data-theme', theme);
    document.getElementById('btn-theme').textContent = theme === 'dark' ? '☀️' : '🌙';
    document.querySelector('meta[name="theme-color"]').content = theme === 'dark' ? '#0f3460' : '#1a5276';
  }
  function toggleTheme() {
    theme = theme === 'dark' ? 'light' : 'dark';
    localStorage.setItem('ppu_theme', theme);
    applyTheme();
  }

  // --- Categories ---
  function buildCategoryGrid() {
    const grid = document.getElementById('cat-grid');
    grid.innerHTML = DB.categories.map(cat => `
      <div class="cat-card fade-in" data-cat="${cat.id}">
        <div class="cat-icon">${ICONS[cat.icon] || '📄'}</div>
        <div class="cat-name">${cat.name_en}</div>
        <div class="cat-name-zh">${cat.name_zh}</div>
        <span class="cat-count">${cat.count} articles</span>
      </div>
    `).join('');
  }

  function showCategory(catId) {
    currentCategory = DB.categories.find(c => c.id === catId);
    if (!currentCategory) return;
    document.getElementById('cat-title').textContent = currentCategory.name_en;
    document.getElementById('cat-count').textContent = `${currentCategory.name_zh} · ${currentCategory.count} articles`;
    const articles = currentCategory.articles.map(id => DB.articles.find(a => a.id === id)).filter(Boolean);
    document.getElementById('cat-articles').innerHTML = articles.map(a => articleItemHTML(a)).join('');
    switchView('category');
  }

  // --- Articles ---
  function articleItemHTML(article, query) {
    const isFav = favorites.includes(article.id);
    let preview = '';
    if (query) {
      preview = getSearchPreview(article.text, query);
    }
    return `
      <div class="article-item fade-in" data-id="${article.id}">
        <button class="article-fav-btn ${isFav ? 'fav' : ''}" data-fav="${article.id}" title="Toggle favorite">
          ${isFav ? '⭐' : '☆'}
        </button>
        <div class="article-info">
          <div class="article-title">${query ? highlightText(article.title, query) : article.title}</div>
          <div class="article-meta">${getCatName(article.category)} · ${article.pages}p</div>
          ${preview ? `<div class="article-preview">${preview}</div>` : ''}
        </div>
      </div>
    `;
  }

  function showArticle(articleId, query) {
    const article = DB.articles.find(a => a.id === articleId);
    if (!article) return;
    currentArticle = article;

    const isFav = favorites.includes(article.id);
    let bodyText = article.text;
    if (query) {
      bodyText = highlightText(bodyText, query);
    }

    const relatedHTML = article.related && article.related.length > 0
      ? `<div class="related-section">
           <div class="related-title">Related Articles</div>
           <div class="article-list">${article.related.map(rid => {
             const r = DB.articles.find(a => a.id === rid);
             return r ? articleItemHTML(r) : '';
           }).join('')}</div>
         </div>` : '';

    document.getElementById('article-viewer').innerHTML = `
      <div class="article-viewer-header">
        <button class="article-viewer-back" id="article-back">←</button>
        <div class="article-viewer-title">${article.title}</div>
        <button class="article-fav-btn ${isFav ? 'fav' : ''}" data-fav="${article.id}" style="font-size:22px;opacity:${isFav?1:0.4}">
          ${isFav ? '⭐' : '☆'}
        </button>
      </div>
      <div class="article-viewer-meta">
        <span>${getCatName(article.category)}</span>
        <span>${article.pages} page${article.pages > 1 ? 's' : ''}</span>
        <span>${article.text.length.toLocaleString()} chars</span>
      </div>
      <div class="article-viewer-body">${bodyText}</div>
      ${article.pdf_url ? `
        <div style="padding:12px 16px;border-top:1px solid var(--border);">
          <a href="${article.pdf_url}" target="_blank" rel="noopener"
             style="display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--accent);color:white;border-radius:8px;text-decoration:none;font-size:13px;font-weight:500;">
            📄 View Original PDF (with figures)
          </a>
        </div>
      ` : ''}
      ${article.keywords.length > 0 ? `
        <div class="article-viewer-keywords">
          ${article.keywords.map(k => `<button class="keyword-tag" data-kw="${k}">${k}</button>`).join('')}
        </div>
      ` : ''}
      ${relatedHTML}
    `;
    switchView('article');
    window.scrollTo(0, 0);
  }

  // --- Search ---
  let searchTimeout;
  function handleSearch(query) {
    query = query.trim();
    currentSearchQuery = query;
    document.getElementById('search-clear').classList.toggle('show', query.length > 0);

    if (!query) {
      switchView(previousView === 'search' ? 'home' : previousView);
      return;
    }

    if (currentView !== 'search') {
      switchView('search');
    }

    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => performSearch(query), 150);
  }

  function performSearch(query) {
    if (!DB) return;
    const q = query.toLowerCase();
    const articleResults = [];
    const noteResults = [];

    // Search articles
    for (const article of DB.articles) {
      let score = 0;
      const titleLower = article.title.toLowerCase();
      const textLower = article.text.toLowerCase();

      if (titleLower.includes(q)) score += 100;
      if (article.keywords.some(k => k.toLowerCase().includes(q))) score += 50;
      const matches = textLower.split(q).length - 1;
      if (matches > 0) score += Math.min(matches * 5, 100);

      if (score > 0) {
        articleResults.push({ article, score, type: 'article' });
      }
    }

    // Search teaching notes
    if (NOTES && NOTES.sections) {
      for (const section of NOTES.sections) {
        let score = 0;
        const titleLower = (section.title + ' ' + section.full_title).toLowerCase();
        const flatText = flattenNoteSection(section).toLowerCase();

        if (titleLower.includes(q)) score += 100;
        const matches = flatText.split(q).length - 1;
        if (matches > 0) score += Math.min(matches * 5, 100);

        if (score > 0) {
          noteResults.push({ section, score, type: 'note' });
        }
      }
    }

    articleResults.sort((a, b) => b.score - a.score);
    noteResults.sort((a, b) => b.score - a.score);

    const totalCount = articleResults.length + noteResults.length;
    const header = document.getElementById('search-header');
    const container = document.getElementById('search-results');

    if (totalCount === 0) {
      header.textContent = 'No results for "' + query + '"';
      container.innerHTML = '';
    } else {
      header.textContent = totalCount + ' result' + (totalCount > 1 ? 's' : '') + ' for "' + query + '"';
      let html = '';

      if (articleResults.length > 0) {
        html += '<div class="search-group-header">\uD83D\uDCCB Patient Education (' + articleResults.length + ')</div>';
        html += '<div class="article-list">';
        html += articleResults.map(r => articleItemHTML(r.article, query)).join('');
        html += '</div>';
      }

      if (noteResults.length > 0) {
        html += '<div class="search-group-header">\uD83D\uDCDD Teaching Notes (' + noteResults.length + ')</div>';
        html += '<div class="article-list">';
        html += noteResults.map(r => noteSearchItemHTML(r.section, query)).join('');
        html += '</div>';
      }

      container.innerHTML = html;
    }

    addRecentSearch(query);
  }

  function flattenNoteSection(section) {
    let text = section.title + ' ' + section.full_title + ' ';
    if (section.subsections) {
      for (const sub of section.subsections) {
        text += sub.title + ' ';
        if (sub.items) {
          text += sub.items.join(' ') + ' ';
        }
      }
    }
    return text;
  }

  function noteSearchItemHTML(section, query) {
    const flatText = flattenNoteSection(section);
    const preview = getSearchPreview(flatText, query);
    return `
      <div class="article-item fade-in" data-note-id="${section.id}">
        <div style="font-size:22px;flex-shrink:0;width:28px;text-align:center">\uD83D\uDCDD</div>
        <div class="article-info">
          <div class="article-title">${highlightText(section.full_title, query)}
            <span class="source-badge teaching-notes">Teaching Notes</span>
          </div>
          <div class="article-meta">${section.subsections.length} subsections</div>
          ${preview ? '<div class="article-preview">' + preview + '</div>' : ''}
        </div>
      </div>
    `;
  }

  function getSearchPreview(text, query) {
    const q = query.toLowerCase();
    const idx = text.toLowerCase().indexOf(q);
    if (idx === -1) return '';
    const start = Math.max(0, idx - 40);
    const end = Math.min(text.length, idx + query.length + 80);
    let snippet = (start > 0 ? '...' : '') + text.slice(start, end) + (end < text.length ? '...' : '');
    return highlightText(snippet, query);
  }

  function highlightText(text, query) {
    if (!query) return text;
    const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const regex = new RegExp(`(${escaped})`, 'gi');
    return text.replace(regex, '<mark>$1</mark>');
  }

  // --- Recent Searches ---
  function addRecentSearch(query) {
    recentSearches = recentSearches.filter(q => q !== query);
    recentSearches.unshift(query);
    if (recentSearches.length > 10) recentSearches = recentSearches.slice(0, 10);
    localStorage.setItem('ppu_recent', JSON.stringify(recentSearches));
    renderRecentSearches();
  }

  function renderRecentSearches() {
    const container = document.getElementById('recent-searches');
    if (!recentSearches.length) {
      container.innerHTML = '';
      return;
    }
    container.innerHTML = `
      <div class="recent-header">
        <span>Recent Searches</span>
        <button class="recent-clear" id="clear-recent">Clear All</button>
      </div>
      <div class="recent-list">
        ${recentSearches.map(q => `<button class="recent-item" data-recent="${q}">${q}</button>`).join('')}
      </div>
    `;
  }

  // --- Glossary ---
  function buildGlossary() {
    const container = document.getElementById('glossary-content');
    const glossary = DB.glossary;
    const terms = Object.keys(glossary).sort((a, b) => {
      const aIsEn = /^[a-zA-Z]/.test(a);
      const bIsEn = /^[a-zA-Z]/.test(b);
      if (aIsEn && !bIsEn) return -1;
      if (!aIsEn && bIsEn) return 1;
      return a.localeCompare(b, 'zh-TW');
    });

    const groups = {};
    terms.forEach(term => {
      const isEn = /^[a-zA-Z]/.test(term);
      const letter = isEn ? term[0].toUpperCase() : '中文術語';
      if (!groups[letter]) groups[letter] = [];
      groups[letter].push(term);
    });

    let html = '';
    for (const [letter, terms] of Object.entries(groups)) {
      html += `<div class="glossary-section">
        <div class="glossary-letter">${letter}</div>
        <div>${terms.map(t => `
          <button class="glossary-term" data-kw="${t}">
            ${t} <span class="count">${glossary[t].length}</span>
          </button>
        `).join('')}</div>
      </div>`;
    }
    container.innerHTML = html;
  }

  // --- Favorites ---
  function toggleFavorite(articleId) {
    const idx = favorites.indexOf(articleId);
    if (idx >= 0) favorites.splice(idx, 1);
    else favorites.push(articleId);
    localStorage.setItem('ppu_favorites', JSON.stringify(favorites));
    renderFavorites();
  }

  function toggleNoteFavorite(noteId) {
    const idx = noteFavorites.indexOf(noteId);
    if (idx >= 0) noteFavorites.splice(idx, 1);
    else noteFavorites.push(noteId);
    localStorage.setItem('ppu_note_favorites', JSON.stringify(noteFavorites));
  }

  function renderFavorites() {
    const container = document.getElementById('fav-articles');
    const empty = document.getElementById('fav-empty');
    if (favorites.length === 0) {
      container.innerHTML = '';
      empty.style.display = 'block';
    } else {
      empty.style.display = 'none';
      const articles = favorites.map(id => DB.articles.find(a => a.id === id)).filter(Boolean);
      container.innerHTML = articles.map(a => articleItemHTML(a)).join('');
    }
  }

  // === Teaching Notes ===

  function buildNotesGrid() {
    if (!NOTES || !NOTES.sections) return;
    const grid = document.getElementById('notes-grid');
    const indicator = document.getElementById('notes-local-indicator');

    if (notesSource === 'local') {
      indicator.innerHTML = '<span class="local-indicator">\u26A0\uFE0F Local changes (not synced)</span>';
    } else {
      indicator.innerHTML = '';
    }

    const admin = isAdmin();
    grid.innerHTML = NOTES.sections.map((section, idx) => `
      <div class="note-card fade-in" data-note-id="${section.id}">
        <div class="note-number">${section.number}</div>
        <div class="note-card-info">
          <div class="note-card-title">${section.title}</div>
          <div class="note-card-meta">${section.subsections.length} subsection${section.subsections.length !== 1 ? 's' : ''}</div>
        </div>
      </div>${admin ? `<button class="btn-insert-section" data-insert-after="${idx}" title="Insert section here" style="display:block;width:100%;border:none;background:none;color:var(--success);font-size:18px;padding:2px 0;cursor:pointer;opacity:0.4;">＋</button>` : ''}
    `).join('');
  }

  function showNoteDetail(noteId, query) {
    const section = NOTES.sections.find(s => s.id === noteId);
    if (!section) return;
    currentNoteId = noteId;

    const isFav = noteFavorites.includes(noteId);

    let bodyHTML = '';
    for (const sub of section.subsections) {
      bodyHTML += '<div class="note-subsection">';
      if (sub.title) {
        bodyHTML += '<h4>' + (query ? highlightText(escapeHTML(sub.title), query) : escapeHTML(sub.title)) + '</h4>';
      }
      if (sub.items && sub.items.length > 0) {
        bodyHTML += '<ul>';
        for (const item of sub.items) {
          bodyHTML += '<li>' + (query ? highlightText(escapeHTML(item), query) : escapeHTML(item)) + '</li>';
        }
        bodyHTML += '</ul>';
      }
      bodyHTML += '</div>';
    }

    document.getElementById('note-detail').innerHTML = `
      <div class="note-detail-header">
        <button class="article-viewer-back" id="note-detail-back">\u2190</button>
        <div class="note-detail-title">${escapeHTML(section.full_title)}</div>
        <div class="note-detail-actions">
          <button class="note-detail-btn" id="note-fav-btn" data-note-fav="${noteId}" title="Toggle favorite">
            ${isFav ? '\u2B50' : '\u2606'}
          </button>
          <button class="note-detail-btn" id="note-edit-btn" data-note-edit="${noteId}" title="Edit" style="${isAdmin() ? '' : 'display:none'}">
            \u270E
          </button>
        </div>
      </div>
      <div class="note-detail-body">${bodyHTML}</div>
    `;
    switchView('note-detail');
    window.scrollTo(0, 0);
  }

  let insertAfterIndex = -1; // -1 = append to end

  function showNoteEdit(noteId) {
    let section;
    let isNew = false;

    if (noteId === '__new__' || noteId.startsWith('__insert_')) {
      isNew = true;
      if (noteId.startsWith('__insert_')) {
        insertAfterIndex = parseInt(noteId.replace('__insert_', ''));
      } else {
        insertAfterIndex = -1;
      }
      section = {
        id: 'tn_' + Date.now(),
        number: '',
        title: '',
        full_title: '',
        subsections: [{ title: '', items: [''] }]
      };
    } else {
      const original = NOTES.sections.find(s => s.id === noteId);
      if (!original) return;
      section = JSON.parse(JSON.stringify(original));
    }

    currentNoteId = section.id;

    let subsectionsHTML = '';
    section.subsections.forEach((sub, i) => {
      subsectionsHTML += buildSubsectionEditBlock(sub, i);
    });

    document.getElementById('note-edit').innerHTML = `
      <div class="note-edit-header">
        <button class="article-viewer-back" id="note-edit-back">\u2190</button>
        <div class="note-edit-header-title">${isNew ? 'Add New Section' : 'Edit Section'}</div>
      </div>
      <div class="note-edit-body">
        <div class="note-edit-field">
          <label>Section Number (e.g. \u4E00, \u4E8C, \u4E09)</label>
          <input type="text" id="edit-section-number" value="${escapeAttr(section.number)}" placeholder="e.g. \u5341\u4E94">
        </div>
        <div class="note-edit-field">
          <label>Section Title</label>
          <input type="text" id="edit-section-title" value="${escapeAttr(section.title)}" placeholder="e.g. LUTS\u3001\u6392\u5C3F\u6A5F\u8F49\u8207\u9580\u8A3A\u529F\u80FD\u8A55\u4F30">
        </div>
        <div class="note-edit-field">
          <label>Subsections</label>
          <div id="edit-subsections">${subsectionsHTML}</div>
          <button class="add-subsection-btn" id="btn-add-subsection">+ Add Subsection</button>
        </div>
      </div>
      <div class="note-edit-actions">
        <button class="btn btn-secondary" id="btn-edit-cancel">Cancel</button>
        <button class="btn btn-success" id="btn-edit-save" data-note-save="${section.id}" data-is-new="${isNew}">\u2713 Save</button>
      </div>
    `;
    switchView('note-edit');
    window.scrollTo(0, 0);
  }

  function buildSubsectionEditBlock(sub, index) {
    return `
      <div class="subsection-edit-block" data-sub-index="${index}">
        <div class="subsection-number">Subsection ${index + 1}</div>
        <button class="subsection-delete-btn" data-delete-sub="${index}" title="Delete subsection">\u2715</button>
        <div class="note-edit-field" style="margin-bottom:8px">
          <label>Subsection Title</label>
          <input type="text" class="sub-title-input" value="${escapeAttr(sub.title)}" placeholder="e.g. 1. Uroflowmetry (UFM) \u5224\u8B80\u91CD\u9EDE">
        </div>
        <div class="note-edit-field" style="margin-bottom:0">
          <label>Items (one per line)</label>
          <textarea class="sub-items-input" placeholder="Enter items, one per line">${escapeHTML(sub.items ? sub.items.join('\n') : '')}</textarea>
        </div>
      </div>
    `;
  }

  function saveNoteEdit(noteId, isNew) {
    const number = document.getElementById('edit-section-number').value.trim();
    const title = document.getElementById('edit-section-title').value.trim();
    const fullTitle = number ? number + '\u3001' + title : title;

    const subsections = [];
    const blocks = document.querySelectorAll('#edit-subsections .subsection-edit-block');
    blocks.forEach(block => {
      const subTitle = block.querySelector('.sub-title-input').value.trim();
      const subItemsRaw = block.querySelector('.sub-items-input').value;
      const items = subItemsRaw.split('\n').filter(line => line.trim() !== '');
      subsections.push({ title: subTitle, items: items });
    });

    if (isNew) {
      const newSection = {
        id: noteId,
        number: number,
        title: title,
        full_title: fullTitle,
        subsections: subsections
      };
      if (insertAfterIndex >= 0 && insertAfterIndex < NOTES.sections.length) {
        NOTES.sections.splice(insertAfterIndex + 1, 0, newSection);
      } else {
        NOTES.sections.push(newSection);
      }
      insertAfterIndex = -1;
      NOTES.total_sections = NOTES.sections.length;
    } else {
      const idx = NOTES.sections.findIndex(s => s.id === noteId);
      if (idx >= 0) {
        NOTES.sections[idx].number = number;
        NOTES.sections[idx].title = title;
        NOTES.sections[idx].full_title = fullTitle;
        NOTES.sections[idx].subsections = subsections;
      }
    }

    // Auto-renumber all sections (I, II, III, ...)
    const romans = ['I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII','XIII','XIV','XV','XVI','XVII','XVIII','XIX','XX'];
    NOTES.sections.forEach((s, i) => {
      s.number = i < romans.length ? romans[i] : String(i + 1);
      s.full_title = s.number + '. ' + s.title;
    });

    // Update timestamp and save to localStorage
    NOTES.updated = new Date().toISOString().slice(0, 10);
    localStorage.setItem('ppu_teaching_notes', JSON.stringify(NOTES));
    notesSource = 'local';

    buildNotesGrid();

    if (isNew) {
      switchView('notes');
    } else {
      showNoteDetail(noteId);
    }
  }

  function deleteSubsection(index) {
    const blocks = document.querySelectorAll('#edit-subsections .subsection-edit-block');
    if (blocks.length <= 1) {
      alert('Cannot delete the last subsection.');
      return;
    }
    if (!confirm('Delete subsection ' + (index + 1) + '?')) return;
    blocks[index].remove();
    // Re-index
    document.querySelectorAll('#edit-subsections .subsection-edit-block').forEach((block, i) => {
      block.dataset.subIndex = i;
      block.querySelector('.subsection-number').textContent = 'Subsection ' + (i + 1);
      block.querySelector('.subsection-delete-btn').dataset.deleteSub = i;
    });
  }

  function addSubsection() {
    const container = document.getElementById('edit-subsections');
    const count = container.querySelectorAll('.subsection-edit-block').length;
    const newBlock = document.createElement('div');
    newBlock.innerHTML = buildSubsectionEditBlock({ title: '', items: [] }, count);
    container.appendChild(newBlock.firstElementChild);
  }

  function exportNotesJSON() {
    const dataStr = JSON.stringify(NOTES, null, 2);
    const blob = new Blob([dataStr], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'teaching-notes.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // --- Admin detection ---
  const GH_TOKEN_KEY = 'ppu_gh_token';
  function isAdmin() {
    if (localStorage.getItem(GH_TOKEN_KEY)) return true;
    const code = (localStorage.getItem('ppu_access_code') || '').toUpperCase();
    return code === 'ADMIN';
  }

  function updateAdminUI() {
    const admin = isAdmin();
    const addBtn = document.getElementById('btn-add-section');
    const syncBtn = document.getElementById('btn-sync-github');
    const suggestBtn = document.getElementById('btn-suggest-note');
    if (addBtn) addBtn.style.display = admin ? '' : 'none';
    if (syncBtn) syncBtn.style.display = admin ? '' : 'none';
    if (suggestBtn) suggestBtn.style.display = admin ? 'none' : '';
  }

  // --- GitHub Sync: push teaching-notes.json directly from browser ---
  const GH_REPO = 'fantasy7386-cmd/pocket-ppu';
  const GH_FILE = 'teaching-notes.json';

  async function syncToGitHub() {
    let token = localStorage.getItem(GH_TOKEN_KEY);
    if (!token) {
      token = prompt(
        'First-time setup: Enter your GitHub Personal Access Token.\n\n' +
        'Create one at: github.com/settings/tokens\n' +
        'Scope needed: "public_repo"\n\n' +
        'This is saved locally on your device only.'
      );
      if (!token) return;
      localStorage.setItem(GH_TOKEN_KEY, token.trim());
    }

    const syncBtn = document.getElementById('btn-sync-github');
    const origText = syncBtn.textContent;
    syncBtn.textContent = 'Syncing...';
    syncBtn.disabled = true;

    try {
      // Get current file SHA (required for update)
      const getResp = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`, {
        headers: { 'Authorization': `token ${token}` }
      });

      if (!getResp.ok && getResp.status === 401) {
        localStorage.removeItem(GH_TOKEN_KEY);
        throw new Error('Invalid token. Please try again.');
      }

      const fileData = await getResp.json();
      const sha = fileData.sha;

      // Prepare updated content
      NOTES.updated = new Date().toISOString().slice(0, 10);
      const content = btoa(unescape(encodeURIComponent(JSON.stringify(NOTES, null, 2))));

      // Push update
      const putResp = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`, {
        method: 'PUT',
        headers: {
          'Authorization': `token ${token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          message: `Update teaching notes ${NOTES.updated}`,
          content: content,
          sha: sha
        })
      });

      if (!putResp.ok) {
        const err = await putResp.json();
        throw new Error(err.message || 'Push failed');
      }

      // Clear local-only state since we've synced
      notesSource = 'server';
      localStorage.removeItem('ppu_teaching_notes');
      buildNotesGrid();

      syncBtn.textContent = '✅ Synced!';
      setTimeout(() => { syncBtn.textContent = origText; syncBtn.disabled = false; }, 2000);
    } catch (e) {
      alert('Sync failed: ' + e.message);
      syncBtn.textContent = origText;
      syncBtn.disabled = false;
    }
  }

  // --- View management ---
  function switchView(name) {
    if (name !== 'article' && name !== 'search' && name !== 'note-detail' && name !== 'note-edit') previousView = currentView;
    currentView = name;
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));

    const viewMap = {
      home: 'view-home',
      category: 'view-category',
      search: 'view-search',
      notes: 'view-notes',
      'note-detail': 'view-note-detail',
      'note-edit': 'view-note-edit',
      glossary: 'view-glossary',
      favorites: 'view-favorites',
      article: 'view-article'
    };
    const el = document.getElementById(viewMap[name]);
    if (el) el.classList.add('active');

    // Update tabs
    document.querySelectorAll('.tab').forEach(t => {
      const tv = t.dataset.view;
      t.classList.toggle('active',
        tv === name ||
        (name === 'category' && tv === 'home') ||
        (name === 'article' && tv === (previousView || 'home')) ||
        ((name === 'note-detail' || name === 'note-edit') && tv === 'notes')
      );
    });

    if (name === 'favorites') renderFavorites();
  }

  // --- Helpers ---
  function getCatName(catId) {
    const cat = DB.categories.find(c => c.id === catId);
    return cat ? cat.name_zh : catId;
  }

  function escapeHTML(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function escapeAttr(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // --- Events ---
  function bindEvents() {
    // Search input
    const searchInput = document.getElementById('search-input');
    searchInput.addEventListener('input', () => handleSearch(searchInput.value));
    searchInput.addEventListener('focus', () => {
      if (!searchInput.value && currentView !== 'search') {
        renderRecentSearches();
        switchView('search');
      }
    });

    // Search clear
    document.getElementById('search-clear').addEventListener('click', () => {
      searchInput.value = '';
      handleSearch('');
      searchInput.focus();
    });

    // Theme toggle
    document.getElementById('btn-theme').addEventListener('click', toggleTheme);

    // Tabs
    document.getElementById('tab-bar').addEventListener('click', e => {
      const tab = e.target.closest('.tab');
      if (!tab) return;
      const view = tab.dataset.view;
      if (view === 'home') {
        searchInput.value = '';
        document.getElementById('search-clear').classList.remove('show');
      }
      switchView(view);
    });

    // Category cards
    document.getElementById('cat-grid').addEventListener('click', e => {
      const card = e.target.closest('.cat-card');
      if (card) showCategory(card.dataset.cat);
    });

    // Category back
    document.getElementById('cat-back').addEventListener('click', () => switchView('home'));

    // Notes view buttons
    document.getElementById('btn-add-section').addEventListener('click', () => {
      showNoteEdit('__new__');
    });

    document.getElementById('btn-sync-github').addEventListener('click', syncToGitHub);

    // Notes grid clicks
    document.getElementById('notes-grid').addEventListener('click', e => {
      const insertBtn = e.target.closest('.btn-insert-section');
      if (insertBtn) {
        showNoteEdit('__insert_' + insertBtn.dataset.insertAfter);
        return;
      }
      const card = e.target.closest('.note-card');
      if (card) {
        showNoteDetail(card.dataset.noteId);
      }
    });

    // Main content delegation
    document.getElementById('main').addEventListener('click', e => {

      // Favorite button (articles)
      const favBtn = e.target.closest('[data-fav]');
      if (favBtn) {
        e.stopPropagation();
        toggleFavorite(favBtn.dataset.fav);
        favBtn.classList.toggle('fav');
        const isFav = favorites.includes(favBtn.dataset.fav);
        favBtn.textContent = isFav ? '⭐' : '☆';
        favBtn.style.opacity = isFav ? 1 : 0.3;
        return;
      }

      // Note favorite button
      const noteFavBtn = e.target.closest('[data-note-fav]');
      if (noteFavBtn) {
        e.stopPropagation();
        const nid = noteFavBtn.dataset.noteFav;
        toggleNoteFavorite(nid);
        const isFav = noteFavorites.includes(nid);
        noteFavBtn.textContent = isFav ? '\u2B50' : '\u2606';
        return;
      }

      // Note edit button
      const noteEditBtn = e.target.closest('[data-note-edit]');
      if (noteEditBtn) {
        e.stopPropagation();
        showNoteEdit(noteEditBtn.dataset.noteEdit);
        return;
      }

      // Note detail back
      if (e.target.closest('#note-detail-back')) {
        switchView('notes');
        return;
      }

      // Note edit back / cancel
      if (e.target.closest('#note-edit-back') || e.target.closest('#btn-edit-cancel')) {
        if (currentView === 'note-edit') {
          // If editing an existing note, go back to detail; if new, go to notes list
          const saveBtn = document.querySelector('[data-note-save]');
          if (saveBtn && saveBtn.dataset.isNew === 'true') {
            switchView('notes');
          } else {
            showNoteDetail(currentNoteId);
          }
        }
        return;
      }

      // Note edit save
      const saveBtn = e.target.closest('[data-note-save]');
      if (saveBtn) {
        const nid = saveBtn.dataset.noteSave;
        const isNew = saveBtn.dataset.isNew === 'true';
        saveNoteEdit(nid, isNew);
        return;
      }

      // Delete subsection
      const delSubBtn = e.target.closest('[data-delete-sub]');
      if (delSubBtn) {
        e.stopPropagation();
        deleteSubsection(parseInt(delSubBtn.dataset.deleteSub, 10));
        return;
      }

      // Add subsection
      if (e.target.closest('#btn-add-subsection')) {
        addSubsection();
        return;
      }

      // Keyword tag
      const kwTag = e.target.closest('[data-kw]');
      if (kwTag) {
        searchInput.value = kwTag.dataset.kw;
        handleSearch(kwTag.dataset.kw);
        return;
      }

      // Article back
      if (e.target.closest('#article-back')) {
        switchView(previousView || 'home');
        return;
      }

      // Recent search
      const recent = e.target.closest('[data-recent]');
      if (recent) {
        searchInput.value = recent.dataset.recent;
        handleSearch(recent.dataset.recent);
        return;
      }

      // Clear recent
      if (e.target.closest('#clear-recent')) {
        recentSearches = [];
        localStorage.setItem('ppu_recent', '[]');
        renderRecentSearches();
        return;
      }

      // Note item from search results
      const noteItem = e.target.closest('[data-note-id]');
      if (noteItem && !noteItem.classList.contains('note-card')) {
        showNoteDetail(noteItem.dataset.noteId, currentView === 'search' ? currentSearchQuery : '');
        return;
      }

      // Article item
      const item = e.target.closest('.article-item');
      if (item && item.dataset.id) {
        showArticle(item.dataset.id, currentView === 'search' ? currentSearchQuery : '');
        return;
      }
    });

    // Back to top
    const backTop = document.getElementById('back-top');
    window.addEventListener('scroll', () => {
      backTop.classList.toggle('show', window.scrollY > 300);
    });
    backTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

    // Keyboard shortcut: Cmd/Ctrl+K to focus search
    document.addEventListener('keydown', e => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        searchInput.focus();
      }
      if (e.key === 'Escape') {
        searchInput.blur();
        if (currentView === 'article') switchView(previousView || 'home');
        if (currentView === 'note-detail') switchView('notes');
        if (currentView === 'note-edit') {
          const saveBtn = document.querySelector('[data-note-save]');
          if (saveBtn && saveBtn.dataset.isNew === 'true') {
            switchView('notes');
          } else {
            showNoteDetail(currentNoteId);
          }
        }
      }
    });
  }

  // --- Swipe right to go back (mobile) ---
  let touchStartX = 0;
  let touchStartY = 0;
  document.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = Math.abs(e.changedTouches[0].clientY - touchStartY);
    // Swipe right: dx > 80px, mostly horizontal (dy < dx/2), started from left edge (< 40px)
    if (dx > 80 && dy < dx / 2 && touchStartX < 40) {
      if (currentView === 'article') {
        switchView(previousView || 'home');
      } else if (currentView === 'note-detail') {
        switchView('notes');
      } else if (currentView === 'note-edit') {
        showNoteDetail(currentNoteId);
      } else if (currentView === 'category') {
        switchView('home');
      } else if (currentView === 'search' && previousView) {
        switchView(previousView);
      }
    }
  }, { passive: true });

  // Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      // Check for updates immediately
      reg.update();
      // When a new SW is found, activate it and reload
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'activated') {
            window.location.reload();
          }
        });
      });
    }).catch(() => {});
  }

  // Start
  init();
})();
</script>
